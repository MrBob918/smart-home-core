syntax = "proto3";

package stt;

service SpeechToText {
    rpc Recognize(RecognizeRequest) returns (RecognizeResponse);

}


message RecognizeRequest {
    bytes audio_content = 1;
}


message RecognizeResponse {
    string text = 1;
    bool success = 2;
    string error_message = 3;
    int64 processing_time_ms = 4;
}